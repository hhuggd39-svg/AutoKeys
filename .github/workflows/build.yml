name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Unzip project
        run: |
          unzip AutoKeys.zip
          ls -la
          find . -name "gradlew" 2>/dev/null
      - name: Build APK
        run: |
          cd AutoKeys
          ls -la
          gradle assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: AutoKeys-APK
          path: AutoKeys/app/build/outputs/apk/debug/app-debug.apk
